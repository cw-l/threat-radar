name: Deploy Radar to Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Running Webpack explicitly using the production config file since the npm script is missing
      - name: Compile Static Assets with Webpack
        run: ./node_modules/.bin/webpack --config webpack.prod.js
        env:
          NODE_ENV: production

      - name: Bundle Sample Data
        run: |
          mkdir -p dist/spec
          cp -r spec/* dist/spec/ || true

      - name: Upload Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
