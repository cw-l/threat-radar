name: Deploy Radar to Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Dynamically determine if a custom domain is being used
      - name: Detect Asset Path & Compile
        run: |
          if [ -f "CNAME" ]; then
            echo "Custom domain detected via CNAME file. Setting ASSET_PATH to /"
            export ASSET_PATH="/"
          else
            echo "No custom domain detected. Setting ASSET_PATH to /${{ github.event.repository.name }}/"
            export ASSET_PATH="/${{ github.event.repository.name }}/"
          fi
          
          ./node_modules/.bin/webpack --config webpack.prod.js
        env:
          NODE_ENV: production
          RINGS: ${{ vars.RINGS }}
          QUADRANTS: ${{ vars.QUADRANTS }}

      # Bundles local sample files and ensures CNAME is preserved in the build output
      - name: Bundle Sample Data and Configurations
        run: |
          mkdir -p dist/spec
          cp -r spec/* dist/spec/ || true
          if [ -f "CNAME" ]; then cp CNAME dist/; fi

      - name: Upload Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
