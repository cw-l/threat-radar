name: Deploy Threat Radar to Pages

on:
  push:
    branches: ["master", "main"] # Triggers on push to master or main
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Uses the repo's supported Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Webpack Static Assets
        run: npm run build
        env:
          NODE_ENV: production

      # The build step creates a 'dist' folder. We copy the spec/sample data 
      # files into it so the hosted app can find its default JSON/CSV targets.
      - name: Bundle Sample Data
        run: |
          mkdir -p dist/spec
          cp -r spec/* dist/spec/ || true

      - name: Upload Static Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
